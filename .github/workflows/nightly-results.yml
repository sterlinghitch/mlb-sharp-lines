name: Nightly Result Logger

on:
  schedule:
    - cron: '0 6 * * *'   # 1:00 AM Eastern (6:00 AM UTC)
  workflow_dispatch:

jobs:
  log-results:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run result logger
        run: python log_results.py

      - name: Commit updated results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"
          git add -f results.json || true
          git add -f picks.json || true
          git diff --staged --quiet || git commit -m "Auto: log best bet results $(date -u '+%Y-%m-%d')"
          git pull --rebase origin main
          git push || true
