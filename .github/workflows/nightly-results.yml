name: Nightly Result Logger

on:
  schedule:
    - cron: '0,30 23 * * *'    # 6:00pm and 6:30pm ET
    - cron: '0,30 0 * * *'     # 7:00pm and 7:30pm ET
    - cron: '0,30 1 * * *'     # 8:00pm and 8:30pm ET
    - cron: '0,30 2 * * *'     # 9:00pm and 9:30pm ET
    - cron: '0,30 3 * * *'     # 10:00pm and 10:30pm ET
    - cron: '0,30 4 * * *'     # 11:00pm and 11:30pm ET
    - cron: '0,30 5 * * *'     # 12:00am and 12:30am ET
    - cron: '0,30 6 * * *'     # 1:00am and 1:30am ET
    - cron: '0 7 * * *'        # 2:00am ET -- final safety net
  workflow_dispatch:

jobs:
  log-results:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run result logger
        id: logger
        run: |
          python log_results.py
          echo "ran=true" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Commit results.json and picks.json
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"
          git add -f results.json || true
          git add -f picks.json || true
          git diff --staged --quiet || git commit -m "Auto: log best bet results $(date -u '+%Y-%m-%d %H:%M')"
          git pull --rebase origin main
          git push || true

      - name: Rebuild site with updated results
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          pip install -r requirements.txt
          python generate.py
        continue-on-error: true

      - name: Commit updated site
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"
          git add index.html picks.json noon_analysis.json picks_history.json || true
          git diff --staged --quiet || git commit -m "Auto: rebuild site after results update $(date -u '+%Y-%m-%d %H:%M')"
          git pull --rebase origin main
          git push || true
