name: Nightly Result Logger

on:
  schedule:
    - cron: '0,30 23 * * *'
    - cron: '0,30 0 * * *'
    - cron: '0,30 1 * * *'
    - cron: '0,30 2 * * *'
    - cron: '0,30 3 * * *'
    - cron: '0,30 4 * * *'
    - cron: '0,30 5 * * *'
    - cron: '0,30 6 * * *'
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  log-results:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run result logger
        run: python log_results.py
        continue-on-error: true

      - name: Commit results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"
          git add -f results.json picks.json || true
          git diff --staged --quiet || git commit -m "Auto: log results $(date -u '+%Y-%m-%d %H:%M')"
          git pull --rebase origin main
          git push || true

      - name: Rebuild site with updated results
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          pip install -r requirements.txt
          # Pass NIGHTLY=1 so generate.py knows not to overwrite picks with wrong date
          NIGHTLY_REBUILD=1 python generate.py
        continue-on-error: true

      - name: Commit updated site
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"
          git add index.html noon_analysis.json || true
          git diff --staged --quiet || git commit -m "Auto: rebuild site $(date -u '+%Y-%m-%d %H:%M')"
          git pull --rebase origin main
          git push || true
