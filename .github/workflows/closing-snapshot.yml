name: Closing Line Snapshot (6:30pm ET)

on:
  schedule:
    - cron: '30 23 * * *'  # 6:30 PM ET = 23:30 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Snapshot closing lines
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python snapshot_lines.py closing

      - name: Commit snapshot
        run: |
          git config user.name "MLB Bot"
          git config user.email "bot@mlbsharplines.com"
          git add -f closing_lines.json || true
          git diff --staged --quiet || git commit -m "Closing lines snapshot $(date +'%B %d %Y')"
          git pull --rebase origin main
          git push || true
