name: Morning Line Snapshot (9am ET)

on:
  schedule:
    - cron: '0 14 * * *'   # 9:00 AM ET = 14:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Snapshot opening lines
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python snapshot_lines.py opening

      - name: Commit snapshot
        run: |
          git config user.name "MLB Bot"
          git config user.email "bot@mlbsharplines.com"
          git add -f opening_lines.json || true
          git diff --staged --quiet || git commit -m "Opening lines snapshot $(date +'%B %d %Y')"
          git pull --rebase origin main
          git push || true
